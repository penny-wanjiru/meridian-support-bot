<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian Electronics — Customer Support</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e3a5f;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header .logo {
      width: 36px; height: 36px;
      background: #3b82f6;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .subtitle { font-size: 12px; opacity: .75; margin-top: 2px; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      line-height: 1.55;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      word-wrap: break-word;
    }
    .message.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px 12px 12px 2px;
    }
    .message.user {
      align-self: flex-end;
      background: #1e3a5f;
      color: #fff;
      border-radius: 12px 12px 2px 12px;
    }
    .message.assistant p { margin-bottom: 8px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant ul, .message.assistant ol { margin: 4px 0 8px 20px; }
    .message.assistant strong { font-weight: 600; }
    .message.assistant code {
      background: #f1f5f9; padding: 2px 5px; border-radius: 4px; font-size: 13px;
    }

    .welcome {
      text-align: center;
      padding: 48px 24px;
      color: #64748b;
    }
    .welcome h2 { color: #1e3a5f; font-size: 20px; margin-bottom: 8px; }
    .welcome p { margin-bottom: 16px; font-size: 14px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .suggestions button {
      background: #fff; border: 1px solid #cbd5e1; border-radius: 20px;
      padding: 8px 16px; font-size: 13px; cursor: pointer;
      color: #334155; transition: all .15s;
    }
    .suggestions button:hover { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px 12px 12px 2px;
      display: none;
    }
    .typing-indicator span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #94a3b8;
      border-radius: 50%;
      margin-right: 4px;
      animation: bounce .6s infinite alternate;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; margin-right: 0; }
    @keyframes bounce { to { transform: translateY(-6px); opacity: .4; } }

    #input-area {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #input-area textarea {
      flex: 1;
      resize: none;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
    }
    #input-area textarea:focus { border-color: #3b82f6; }
    #input-area button {
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    #input-area button:hover { background: #2d5a8e; }
    #input-area button:disabled { background: #94a3b8; cursor: not-allowed; }

    .error-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #ef4444; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 13px; display: none; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">M</div>
    <div>
      <h1>Meridian Electronics</h1>
      <div class="subtitle">Customer Support</div>
    </div>
  </header>

  <div id="chat-container">
    <div class="welcome" id="welcome">
      <h2>Welcome to Meridian Electronics Support</h2>
      <p>I can help you browse products, check orders, and more. How can I help?</p>
      <div class="suggestions">
        <button onclick="sendSuggestion(this)">What products do you have?</button>
        <button onclick="sendSuggestion(this)">Search for monitors</button>
        <button onclick="sendSuggestion(this)">I need to check my order</button>
        <button onclick="sendSuggestion(this)">Help me place an order</button>
      </div>
    </div>

    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="error-toast" id="error-toast"></div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Type your message..."
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const typing = document.getElementById("typing");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const welcome = document.getElementById("welcome");
    const errorToast = document.getElementById("error-toast");

    let messages = [];
    let isLoading = false;

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendSuggestion(btn) {
      input.value = btn.textContent;
      sendMessage();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addBubble(role, content) {
      const div = document.createElement("div");
      div.className = "message " + role;
      if (role === "assistant") {
        div.innerHTML = marked.parse(content);
      } else {
        div.textContent = content;
      }
      chatContainer.insertBefore(div, typing);
      scrollToBottom();
    }

    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.style.display = "block";
      setTimeout(() => { errorToast.style.display = "none"; }, 5000);
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isLoading) return;

      if (welcome) welcome.style.display = "none";

      messages.push({ role: "user", content: text });
      addBubble("user", text);
      input.value = "";
      input.style.height = "auto";

      isLoading = true;
      sendBtn.disabled = true;
      typing.style.display = "block";
      scrollToBottom();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Server error (${res.status})`);
        }

        const data = await res.json();
        messages.push({ role: "assistant", content: data.content });
        addBubble("assistant", data.content);
      } catch (err) {
        showError(err.message || "Something went wrong. Please try again.");
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        typing.style.display = "none";
      }
    }
  </script>
</body>
</html>
